apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crypto-pipeline-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/edmundkb/crypto-infra-k8s.git'
    targetRevision: HEAD
    path: manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true